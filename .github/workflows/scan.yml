name: Radar Futsal — recolha
on:
  schedule:
    - cron: "*/30 6-22 * * *"   # de 30 em 30 min, ~07h-23h Lisboa (UTC+1)
  workflow_dispatch:
    inputs:
      force_ig:
        description: "Forçar varredura de Instagram agora (custa crédito Apify)"
        type: boolean
        default: false
permissions:
  contents: write                # para dar commit do index.html
concurrency:
  group: radar-scan
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Correr recolha
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FORCE_IG: ${{ github.event.inputs.force_ig }}
        run: python scan.py
      - name: Publicar se houve novidades
        run: |
          git config user.name "radar-futsal-bot"
          git config user.email "actions@github.com"
          git add index.html ig_last.txt 2>/dev/null || git add index.html
          if git diff --cached --quiet; then
            echo "Sem alterações."; exit 0
          fi
          git commit -m "Radar: recolha $(date -u +'%Y-%m-%d %H:%M')Z"
          # retry: em corrida com outros gatilhos, rebase por cima e volta a tentar
          for i in 1 2 3 4 5; do
            if git push; then echo "push OK"; exit 0; fi
            echo "push rejeitado (corrida) — tentativa $i, a rebasar…"
            git pull --rebase -X ours origin main || true
            sleep 4
          done
          echo "push falhou após 5 tentativas"; exit 1
